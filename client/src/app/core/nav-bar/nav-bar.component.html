<nav class="wf-navbar" [class.is-mobile-open]="isMobileMenuOpen">
  <div class="wf-navbar__inner">
    <a class="wf-navbar__brand" routerLink="/" (click)="closeMobileMenu()">
      <img
        src="/WF-Images/globe.png"
        alt="WorldFamous logo"
        width="42"
        height="42"
      />
      <span class="wf-navbar__brand-text">WorldFamous LLC</span>
    </a>

    <button
      class="wf-navbar__toggle"
      type="button"
      [attr.aria-expanded]="isMobileMenuOpen"
      aria-controls="wf-navbar-panel"
      aria-label="Toggle navigation"
      (click)="toggleMobileMenu($event)"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div
      id="wf-navbar-panel"
      class="wf-navbar__panel"
      [class.is-open]="isMobileMenuOpen"
    >
      <ul class="wf-navbar__links">
        <li>
          <a
            class="wf-navbar__link"
            routerLink="/"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            (click)="closeMobileMenu()"
          >Home</a>
        </li>
        <li>
          <a
            class="wf-navbar__link"
            routerLink="/shop"
            routerLinkActive="active"
            (click)="closeMobileMenu()"
          >Shop</a>
        </li>
        <li>
          <a
            class="wf-navbar__link"
            routerLink="/test-error"
            routerLinkActive="active"
            (click)="closeMobileMenu()"
          >Errors</a>
        </li>
      </ul>

      <div class="wf-navbar__actions">
        <a
          routerLink="/basket"
          class="wf-navbar__cart"
          aria-label="View basket"
          (click)="closeMobileMenu()"
        >
          <i class="fa fa-shopping-cart" aria-hidden="true"></i>
          <span
            class="wf-navbar__cart-badge"
            aria-live="polite"
            aria-atomic="true"
          >
            <ng-container *ngIf="(basket$ | async) as basket">{{ basket.items.length }}</ng-container>
          </span>
        </a>

        <ng-container *ngIf="(currentUser$ | async) === null">
          <div class="wf-navbar__guest-actions">
            <a
              routerLink="/account/login"
              class="wf-navbar__auth-button wf-navbar__auth-button--login"
              routerLinkActive="active"
              (click)="closeMobileMenu()"
            >
              <span class="wf-navbar__auth-label">Login</span>
            </a>
            <a
              routerLink="/account/register"
              class="wf-navbar__auth-button wf-navbar__auth-button--register"
              routerLinkActive="active"
              (click)="closeMobileMenu()"
            >
              <span class="wf-navbar__auth-label">Register</span>
            </a>
          </div>
        </ng-container>

        <ng-container *ngIf="currentUser$ | async as user">
          <div class="dropdown wf-navbar__user-menu">
            <a
              id="userDropdown"
              class="dropdown-toggle wf-navbar__user-toggle"
              href="#"
              role="button"
              data-bs-toggle="dropdown"
              aria-expanded="false"
            >
              <span class="wf-navbar__user-label">Hello, {{ user.displayName }}</span>
            </a>

            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
              <li>
                <a class="dropdown-item d-flex align-items-center py-2" routerLink="/basket" (click)="closeMobileMenu()">
                  <i class="fa fa-shopping-cart me-2"></i> View Basket
                </a>
              </li>
              <li>
                <a class="dropdown-item d-flex align-items-center py-2" routerLink="/orders" (click)="closeMobileMenu()">
                  <i class="fa fa-history me-2"></i> View Orders
                </a>
              </li>
              <li><hr class="dropdown-divider" /></li>
              <li>
                <a class="dropdown-item d-flex align-items-center py-2" style="cursor: pointer;" (click)="logout()">
                  <i class="fa fa-sign-out me-2"></i> Logout
                </a>
              </li>
            </ul>
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</nav>
