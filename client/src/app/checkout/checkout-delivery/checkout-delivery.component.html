<div class="mt-4 checkout-step" *ngIf="checkoutForm" [formGroup]="checkoutForm">
    <div class="row g-3 delivery-options" formGroupName="deliveryForm">
        <div class="col-12 col-md-6" *ngFor="let method of deliveryMethods">
            <label
              class="delivery-option"
              [class.is-selected]="checkoutForm.get('deliveryForm.deliveryMethod')?.value == method.id"
              [for]="method.id">
                <input type="radio"
                    class="form-check-input delivery-option__input"
                     value="{{method.id}}"
                     id="{{method.id}}"
                     formControlName="deliveryMethod"
                     (click)="setShippingPrice(method)"
                >

                <div class="delivery-option__content">
                  <div class="delivery-option__title-row">
                    <strong>{{method.shortName}}</strong>
                    <strong>{{method.price | currency}}</strong>
                  </div>
                  <span class="label-description delivery-option__description">{{method.description}}</span>
                </div>
            </label>
        </div>
    </div>

</div>

<div class="d-flex justify-content-between flex-row flex-wrap gap-3 mb-5 checkout-nav-buttons">
  <button class="btn btn-outline-primary" cdkStepperPrevious>
    <i class="fa fa-angle-left"></i> Back to address
  </button>
   <button 
   class="btn btn-primary"
   cdkStepperNext
   [disabled]="!checkoutForm.get('deliveryForm')?.valid"
    >
   Go to Review <i class="fa fa-angle-right"></i> 
  </button>
</div>
