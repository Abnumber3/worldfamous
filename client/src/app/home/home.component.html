<section class="home-hero">
  <div class="hero-shell">
    <div class="hero-copy">
      <p class="hero-kicker">Streetwear. Motion. Identity.</p>
      <h1 class="hero-title" aria-label="World Famous">
        <span class="hero-title-line hero-title-line--top">World</span>
        <span class="hero-title-line hero-title-line--bottom">Famous</span>
      </h1>
      <p class="hero-description">
        Built for the ones who move different. Premium everyday pieces with a bold,
        city-first attitude.
      </p>

      <div class="hero-actions">
        <button type="button" class="hero-btn hero-btn--primary" (click)="goToShop()">Shop Now</button>
        <button type="button" class="hero-btn hero-btn--secondary" (click)="goToRegister()">Create Account</button>
      </div>
    </div>

    <div class="hero-visual" aria-hidden="true">
      <div class="hero-image-frame">
        <img src="/WF-Images/man-2.png" alt="Model wearing World Famous streetwear" />
      </div>
      <div class="hero-badge">
        <span>New Season</span>
        <strong>Urban essentials for every fit.</strong>
      </div>
    </div>
  </div>
</section>
